services:
  pi-agent:
    build: .
    image: ${IMAGE_NAME}
    container_name: ${CONTAINER_NAME}
    volumes:
      - ${PROJECT_DIR}:/workspace:rw
    working_dir: /workspace
    user: "1000:1000"
    environment:
      - PI_PROMPT=${PI_PROMPT}
      - PI_MODEL=${PI_MODEL}
      - PI_PROVIDER=${PI_PROVIDER}
      - PI_THINKING_LEVEL=${PI_THINKING_LEVEL}
      - PI_LOG_FILE=/workspace/.codver-logs.jsonl
      - PI_IMAGES=${PI_IMAGES}
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g
      - /root/.pi:rw,noexec,nosuid,nodev,size=100m
    security_opt:
      - no-new-privileges:true
      - seccomp:default
      - apparmor:docker-default
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT}"
          memory: "${MEMORY_LIMIT}"
          pids: 100
    restart: "no"
    network_mode: bridge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
